name: Generate ranking chart

on:
  push:
    paths:
      - 'klasyfikacja_generalna.csv'
      - 'ranking_general.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install matplotlib pandas numpy

      - run: python ranking_general.py

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ranking_general.png
          git diff --cached --quiet || git commit -m "Auto-update ranking chart" && git push
